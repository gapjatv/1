<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갑자TV 시참 신청</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #121212; color: white;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; padding-top: 10vh;
            min-height: 100vh; margin: 0; text-align: center; box-sizing: border-box;
        }
        .container {
            width: 85%; max-width: 380px; padding: 30px 20px; 
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; border: 3px solid #ffcc00; 
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
            box-sizing: border-box; transition: all 0.3s ease;
        }
        
        .header-container { position: relative; width: 100%; text-align: center; margin-bottom: 10px; }
        .title-logo { width: 120px; height: auto; margin-top: 15px; margin-bottom: 5px; filter: drop-shadow(0 0 5px rgba(255,204,0,0.5)); }
        
        h1 { color: #ffcc00; margin: 0 0 10px 0; font-size: 1.5rem; line-height: 1.4; }
        .waiting-status {
            background: rgba(255, 204, 0, 0.1); color: #ffcc00;
            padding: 8px 15px; border-radius: 50px; font-size: 0.85rem;
            display: inline-block; margin-bottom: 20px; font-weight: bold;
        }
        #liveClock { color: #ffcc00; font-size: 1.1rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* 7:3 비율 유지 */
        .input-group {
            display: flex; gap: 8px; margin-bottom: 15px; width: 100%;
        }
        input {
            flex: 7; min-width: 0; padding: 15px; margin-bottom: 0; 
            border-radius: 10px; border: 1px solid #555;
            background: #222; color: white; font-size: 1.1rem;
            box-sizing: border-box; text-align: center;
        }
        select {
            flex: 3; min-width: 0; padding: 15px 5px; border-radius: 10px; border: 1px solid #555;
            background: #222; color: #ffcc00; font-size: 0.95rem; font-weight: bold;
            box-sizing: border-box; cursor: pointer; text-align: center;
        }

        button.main-btn {
            width: 100%; 
            padding: 15px; border-radius: 10px; border: none; margin-bottom: 15px;
            background: #ffcc00; color: #000; font-size: 1.2rem; font-weight: 900; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
            transition: transform 0.1s;
        }
        button.main-btn:active { transform: scale(0.98); }
        button.main-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .donate-btn-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        .donate-btn {
            flex: 1; padding: 12px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 0.85rem; letter-spacing: -0.5px; white-space: nowrap; cursor: pointer; color: white; transition: transform 0.1s;
        }
        .donate-btn:active { transform: scale(0.95); }
        .btn-toon { background: linear-gradient(to right, #00a8ff, #0097e6); box-shadow: 0 3px 8px rgba(0, 168, 255, 0.4); }
        .btn-bank { background: linear-gradient(to right, #4CAF50, #388E3C); box-shadow: 0 3px 8px rgba(76, 175, 80, 0.4); }

        .cooldown-msg { color: #ff4444; font-size: 0.8rem; margin-top: -5px; display: none; }
        
        #successSection, #prioritySection, #prioritySuccessSection { display: none; }
        .success-icon { font-size: 4rem; color: #ffcc00; margin-bottom: 20px; }
        
        .footer-link { margin-top: 20px; font-size: 0.8rem; color: #666; cursor: pointer; text-decoration: underline; transition: color 0.2s; font-family: 'Pretendard', 'Malgun Gothic', sans-serif;}
        .footer-link:hover { color: #ffcc00; }
        .back-link { margin-top: 20px; font-size: 0.85rem; color: #aaa; text-decoration: underline; cursor: pointer; }

        /* 커스텀 팝업(모달) 스타일 추가 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-box {
            background: #222; padding: 25px 20px; border-radius: 15px; border: 2px solid #ffcc00;
            width: 80%; max-width: 320px; text-align: center; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        .modal-box p { color: white; margin-bottom: 20px; font-size: 1.1rem; line-height: 1.5; font-weight: bold; }
        .modal-btn-group { display: flex; gap: 10px; width: 100%; }
        .modal-btn {
            flex: 1; padding: 12px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s;
        }
        .modal-btn:active { transform: scale(0.95); }
        .btn-cancel { background: #555; color: white; }
        .btn-confirm { background: #ffcc00; color: black; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        
        <div id="formSection">
            
            <div class="header-container">
                <img src="https://tistory1.daumcdn.net/tistory/4488967/skin/images/gajayu.png" class="title-logo">
            </div>

            <h1>갑자TV 시참 신청</h1>
            <div class="waiting-status">🔥현재 참여자 : <span id="waitingCount">확인중...</span></div>
            <div id="liveClock">0000년 00월 00일 00:00:00</div>
            
            <div class="input-group">
                <input type="text" id="nickname" placeholder="게임 닉네임 입력">
                <select id="modeSelect" onchange="checkModeSelect()">
                    <option value="태초">태초</option>
                    <option value="신">신</option>
                    <option value="우선예약">우선예약(모든모드)</option>
                    <option value="채팅">채팅</option>
                </select>
            </div>
            
            <button id="submitBtn" class="main-btn" onclick="sendData()">🚀 신청하기</button>
            <div id="cooldownMsg" class="cooldown-msg">도배 방지를 위해 잠시 후 다시 신청 가능합니다.</div>
            
            <div class="footer-link" onclick="window.open('https://toon.at/donate/gapjatv', '_blank')">후원하기</div>
        </div>

        <div id="successSection">
            <div class="success-icon">
                <img src="https://tistory1.daumcdn.net/tistory/4488967/skin/images/beullob.png" style="width: 150px; height: auto; filter: drop-shadow(0 0 10px rgba(255,204,0,0.5));">
            </div>
            <h1 style="color: white;">신청 완료!</h1>
            <p style="color: #ffcc00; font-weight: bold;">정상적으로 접수되었습니다.</p>
            <p>방송을 보며 순서를 기다려주세요!</p>
            <button onclick="location.reload()" style="background: #333; color: #fff; font-size: 0.9rem; padding: 10px; margin-top: 20px; border-radius: 8px; border:none; cursor:pointer;">처음으로</button>
        </div>

        <div id="prioritySection">
            <img src="https://tistory1.daumcdn.net/tistory/4488967/skin/images/gajayu.png" class="title-logo" style="display: block; margin: 0 auto 10px auto; width: 120px; margin-top: 0;">
            <h1>갑자ᵗᵛ 후원 및 우선예약</h1>
            
            <div class="donate-btn-group">
                <button class="donate-btn btn-toon" onclick="window.open('https://toon.at/donate/gapjatv', '_blank')">💎 투네이션 5,000원</button>
                <button class="donate-btn btn-bank" onclick="copyBankAccount()">🏦 계좌후원 5,000원</button>
            </div>

            <div class="input-group">
                <input type="text" id="priorityNickname" placeholder="게임 닉네임 입력">
                <select id="priorityModeSelect" onchange="checkPriorityModeSelect()">
                    <option value="" disabled selected>선택</option>
                    <option value="태초">태초</option>
                    <option value="신">신</option>
                    <option value="지옥">지옥</option>
                    <option value="하드">하드</option>
                    <option value="일반">일반</option>
                    <option value="채팅(알림)">채팅(알림)</option>
                </select>
            </div>
            
            <button id="prioritySubmitBtn" class="main-btn" onclick="openConfirmModal()">🚀 우선예약 신청</button>
            <div id="priorityCooldownMsg" class="cooldown-msg">도배 방지를 위해 1분 후 다시 신청 가능합니다.</div>
            
            <div class="back-link" onclick="goBackToMain()">← 일반 신청가기</div>
        </div>

        <div id="prioritySuccessSection">
            <div class="success-icon">
                <img src="https://tistory1.daumcdn.net/tistory/4488967/skin/images/baeteumaen.png" style="width: 170px; height: auto; filter: drop-shadow(0 0 10px rgba(255,204,0,0.5));">
            </div>
            <h1 style="color: white;">우선예약 완료!</h1>
            <p style="color: #ffcc00; font-weight: bold; font-size: 1.2rem;">우선예약 완료 되었습니다.</p>
            <p style="line-height: 1.6;">소중한 후원 정말 감사드립니다!<br>방송 화면에서 바로 확인해 드릴게요! 💖</p>
            <button onclick="location.reload()" style="background: #333; color: #fff; font-size: 0.9rem; padding: 10px; margin-top: 20px; border-radius: 8px; border:none; cursor:pointer;">처음으로</button>
        </div>

    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <p>후원 완료 후<br>신청이 가능합니다.</p>
            <div class="modal-btn-group">
                <button class="modal-btn btn-cancel" onclick="closeConfirmModal()">돌아가기</button>
                <button class="modal-btn btn-confirm" onclick="executePrioritySubmit()">신청완료</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyyJuoBA7A-mzqmBHdV52HBYB21K__bWa_MMHPUDI1rMn7bpzO_uAJbAeBS8XPdhGOb/exec"; 
        const COOLDOWN_TIME = 5 * 60 * 1000;          
        const PRIORITY_COOLDOWN_TIME = 1 * 60 * 1000; 

        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveClock').innerText = `${year}년 ${month}월 ${day}일 ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function fetchWaitingCount() {
            fetch(GAS_URL)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('waitingCount').innerText = (data.count || 0) + "명";
                })
                .catch(() => {
                    document.getElementById('waitingCount').innerText = "0명";
                });
        }

        function checkCooldown() {
            const lastSubmit = localStorage.getItem('lastSubmitTime');
            if (lastSubmit) {
                if (Date.now() - parseInt(lastSubmit) < COOLDOWN_TIME) {
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = true;
                    document.getElementById('cooldownMsg').style.display = 'block';
                    btn.innerText = "잠시 후 신청 가능";
                }
            }

            const lastPrioritySubmit = localStorage.getItem('lastPrioritySubmitTime');
            if (lastPrioritySubmit) {
                if (Date.now() - parseInt(lastPrioritySubmit) < PRIORITY_COOLDOWN_TIME) {
                    const pBtn = document.getElementById('prioritySubmitBtn');
                    pBtn.disabled = true;
                    document.getElementById('priorityCooldownMsg').style.display = 'block';
                    pBtn.innerText = "잠시 후 신청 가능";
                }
            }
        }

        function checkModeSelect() {
            const selectEl = document.getElementById('modeSelect');
            const mode = selectEl.value;
            
            if (mode === "우선예약") {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('prioritySection').style.display = 'block';
                selectEl.value = "태초"; 
            } else if (mode === "채팅") {
                window.open('https://gapjatv.github.io/chat/', '_blank');
                selectEl.value = "태초"; 
            }
        }

        // 우선예약 창의 드롭다운 처리 추가
        function checkPriorityModeSelect() {
            const selectEl = document.getElementById('priorityModeSelect');
            if (selectEl.value === "채팅(알림)") {
                window.open('https://gapjatv.github.io/chat/', '_blank');
                selectEl.value = ""; // 창 열고 나서 다시 '선택' 상태로 되돌림
            }
        }

        function goBackToMain() {
            document.getElementById('prioritySection').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
        }

        function copyBankAccount() {
            const accountInfo = "3333-11-6729871"; 
            navigator.clipboard.writeText(accountInfo).then(() => {
                alert("카카오뱅크 3333-11-6729871 (예금주: 백**)\n\n✅ 계좌번호가 복사되었습니다!\n소중한 후원 정말 감사드립니다!");
            }).catch(err => {
                alert("카카오뱅크 3333-11-6729871 (예금주: 백**)\n\n소중한 후원 정말 감사드립니다!");
            });
        }

        function sendData() {
            const input = document.getElementById('nickname');
            const mode = document.getElementById('modeSelect').value; 
            const btn = document.getElementById('submitBtn');
            const name = input.value.trim();

            if (!name) return alert("닉네임을 입력해주세요!");

            btn.disabled = true;
            btn.innerText = "전송 중...";
            const combinedNickname = name + " [" + mode + "]";

            fetch(GAS_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nickname: combinedNickname }) 
            })
            .then(() => {
                localStorage.setItem('lastSubmitTime', Date.now());
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';
            })
            .catch(() => {
                alert("오류 발생! 다시 시도해주세요.");
                btn.disabled = false;
                btn.innerText = "🚀 신청하기";
            });
        }

        // 모달 열기 함수
        function openConfirmModal() {
            const input = document.getElementById('priorityNickname');
            const selectEl = document.getElementById('priorityModeSelect');
            const mode = selectEl.value;
            const name = input.value.trim();

            if (!name) return alert("게임 닉네임을 입력해주세요!");
            if (!mode) return alert("모드를 선택해주세요!"); // '선택' 상태인 경우 방어

            document.getElementById('confirmModal').style.display = 'flex';
        }

        // 모달 닫기(돌아가기) 함수
        function closeConfirmModal() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        // 실제 우선예약 전송 함수 (신청완료 클릭 시 실행)
        function executePrioritySubmit() {
            closeConfirmModal(); // 창 먼저 닫기

            const input = document.getElementById('priorityNickname');
            const mode = document.getElementById('priorityModeSelect').value; 
            const btn = document.getElementById('prioritySubmitBtn');
            const name = input.value.trim();

            btn.disabled = true;
            btn.innerText = "전송 중...";
            const combinedNickname = name + " [우선예약-" + mode + "]";

            fetch(GAS_URL, {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nickname: combinedNickname }) 
            })
            .then(() => {
                localStorage.setItem('lastPrioritySubmitTime', Date.now());
                document.getElementById('prioritySection').style.display = 'none';
                document.getElementById('prioritySuccessSection').style.display = 'block';
            })
            .catch(() => {
                alert("오류 발생! 다시 시도해주세요.");
                btn.disabled = false;
                btn.innerText = "🚀 우선예약 신청";
            });
        }

        window.onload = () => { fetchWaitingCount(); checkCooldown(); };
    </script>
</body>
</html>
